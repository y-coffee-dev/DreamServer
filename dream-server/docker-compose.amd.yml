# Dream Server — AMD GPU Overlay (Lemonade inference backend)
# Lemonade provides optimized local AI inference with Vulkan, ROCm, and NPU support.
# ComfyUI GPU config moved to extensions/services/comfyui/compose.amd.yaml
# Use with: docker compose -f docker-compose.base.yml -f docker-compose.amd.yml up -d

services:
  llama-server:
    # Lemonade Docker image with ROCm support + libatomic1 fix
    # Service name stays "llama-server" for compose dependency compatibility
    build:
      context: ./extensions/services/llama-server
      dockerfile: Dockerfile.amd
    image: dream-lemonade-server:latest
    entrypoint: ["/opt/lemonade/lemonade-server"]
    command:
      - serve
      - --port
      - "8080"
      - --host
      - "0.0.0.0"
      - --no-tray
      - --llamacpp
      - rocm
      - --llamacpp-args
      - "--metrics --host 0.0.0.0"
      - --extra-models-dir
      - /models
    expose:
      - "8001"
    volumes:
      - ./data/models:/models:ro
      - lemonade-cache:/root/.cache/huggingface
      - lemonade-llama:/opt/lemonade/llama
      - lemonade-recipe:/root/.cache/lemonade
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-992}"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      - ROCBLAS_USE_HIPBLASLT=0
      - LEMONADE_LLAMACPP_BACKEND=rocm
      - LEMONADE_CTX_SIZE=${CTX_SIZE:-131072}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '16.0'
          memory: 110G
        reservations:
          cpus: '4.0'
          memory: 8G

  # Services route through LiteLLM (DREAM_MODE=lemonade sets LLM_API_URL=http://litellm:4000).
  # LiteLLM handles the /api/v1 translation to Lemonade internally.
  # Auth disabled via extensions/services/litellm/compose.amd.yaml (loads after compose.yaml).

  open-webui:
    environment:
      - OPENAI_API_KEY=no-key

  dashboard-api:
    environment:
      - GPU_BACKEND=amd
      - LLM_BACKEND=lemonade
      - LLAMA_METRICS_PORT=8001
    volumes:
      - /sys/class/drm:/sys/class/drm:ro
      - /sys/class/hwmon:/sys/class/hwmon:ro

volumes:
  lemonade-cache:
  lemonade-llama:
  lemonade-recipe:
