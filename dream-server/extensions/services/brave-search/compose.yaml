services:
  brave-search:
    build:
      context: .
      dockerfile: Dockerfile
    image: dream-brave-search:local
    container_name: dream-brave-search
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - BRAVE_SEARCH_PORT_INTERNAL=8585
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${BRAVE_SEARCH_PORT:-8585}:8585"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:8585/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
