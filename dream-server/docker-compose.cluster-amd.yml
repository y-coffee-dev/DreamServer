# Dream Server — LAN Cluster Overlay (AMD / ROCm)
# Bypasses Lemonade entirely — runs llama-server directly with ROCm + RPC.
# Lemonade does not support --rpc passthrough; cluster mode needs raw llama-server.
# Single-node AMD installs continue using Lemonade via docker-compose.amd.yml.
#
# Use with:
#   docker compose -f docker-compose.base.yml -f docker-compose.amd.yml \
#                  -f docker-compose.cluster-amd.yml up -d
#
# Requires: CLUSTER_WORKERS, CLUSTER_TENSOR_SPLIT in .env

services:
  llama-server:
    image: ${CLUSTER_CONTROLLER_IMAGE:-dream-llama-rpc:rocm}
    # Supervisor owns restart logic — don't let Docker's restart policy interfere
    restart: "no"
    entrypoint: ["python3", "/usr/local/bin/dream-cluster-supervisor.py"]
    command:
      - --model
      - /models/${GGUF_FILE:-Qwen3.5-9B-Q4_K_M.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --n-gpu-layers
      - "999"
      - --ctx-size
      - "${CTX_SIZE:-16384}"
      - --batch-size
      - "${LLAMA_BATCH_SIZE:-2048}"
      - --threads
      - "${LLAMA_THREADS:-4}"
      - --parallel
      - "${LLAMA_PARALLEL:-1}"
      - --metrics
      - --rpc
      - "${CLUSTER_WORKERS}"
      - --tensor-split
      - "${CLUSTER_TENSOR_SPLIT}"
      - --no-warmup
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-992}"
    environment:
      HSA_OVERRIDE_GFX_VERSION: "${HSA_OVERRIDE_GFX_VERSION:-}"
      ROCR_VISIBLE_DEVICES: "${ROCR_VISIBLE_DEVICES:-}"
      CLUSTER_WORKERS: "${CLUSTER_WORKERS}"
      CLUSTER_RESTART_POLICY: "${CLUSTER_RESTART_POLICY:-always}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    volumes:
      - cluster-events:/tmp/cluster-events

volumes:
  cluster-events:
