# Dream Server -- macOS Apple Silicon Overlay
# llama-server runs natively on macOS host with Metal acceleration
# All other services remain in Docker, reaching the host via host.docker.internal
#
# Use with: docker compose -f docker-compose.base.yml -f installers/macos/docker-compose.macos.yml up -d

services:
  llama-server:
    image: busybox:latest   # Placeholder -- container never runs (replicas: 0)
    deploy:
      replicas: 0    # Disabled -- running natively on macOS host via Metal

  dashboard-api:
    environment:
      - OLLAMA_URL=http://host.docker.internal:8080
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=8080        # llama-server runs natively on macOS at this port
      # gpu.py routes to get_gpu_info_apple() which reads HOST_* env vars.
      # config.py defaults include 'apple' so all manifests are discovered.
      - GPU_BACKEND=apple
      # Static host hardware info written to .env by install-macos.sh (Phase 2).
      - HOST_RAM_GB=${HOST_RAM_GB:-0}   # explicit override; base.yml also carries this for other platforms

  open-webui:
    environment:
      OPENAI_API_BASE_URL: "http://host.docker.internal:8080/v1"
